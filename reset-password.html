<!-- reset-password.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SakuDua – Reset Password</title>
  <style>
    /* sama persis dengan invite page kamu */
  </style>
</head>
<body>
<div class="card">
  <div class="icon">🔐</div>
  <h1>Reset Password</h1>
  <p class="subtitle">Tap tombol di bawah untuk melanjutkan reset password di aplikasi <strong>SakuDua</strong>.</p>
  <button class="btn btn-primary" onclick="openApp()">Buka di Aplikasi SakuDua</button>
  <p class="status" id="status"></p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token') || '';

  function openApp() {
    const deepLink = `sakudua://reset-password?token=${token}`;
    document.getElementById('status').innerHTML = '<span class="spinner"></span>Membuka aplikasi...';
    window.location.href = deepLink;
  }

  // auto-open kalau ada token
  if (token) setTimeout(openApp, 800);
</script>
</body>
</html>
