<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SakuDua – Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --emerald: #00d4a0;
      --emerald-dim: #00a57a;
      --emerald-glow: rgba(0, 212, 160, 0.18);
      --bg: #080f0c;
      --surface: #0e1a15;
      --surface2: #142019;
      --border: rgba(0, 212, 160, 0.15);
      --text: #e8f5f0;
      --muted: #5a7a6e;
      --mono: 'DM Mono', monospace;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Background mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(0,212,160,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(0,165,122,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 30% 30% at 50% 50%, rgba(0,212,160,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,160,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px 44px;
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
      box-shadow:
        0 0 0 1px rgba(0,212,160,0.05),
        0 24px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(0,212,160,0.04) inset;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--emerald), transparent);
      border-radius: 999px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--emerald);
      background: rgba(0,212,160,0.08);
      border: 1px solid rgba(0,212,160,0.2);
      border-radius: 999px;
      padding: 5px 12px;
      margin-bottom: 28px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--emerald);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--emerald);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .icon-wrap {
      width: 68px;
      height: 68px;
      margin-bottom: 24px;
      position: relative;
    }

    .icon-wrap svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 10px;
      letter-spacing: -0.03em;
    }

    h1 span {
      background: linear-gradient(135deg, #00d4a0, #00ff9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.65;
      margin-bottom: 36px;
      font-weight: 300;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 20px;
      border-radius: 14px;
      font-family: 'Sora', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s cubic-bezier(.22,1,.36,1);
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4a0 0%, #00b386 100%);
      color: #080f0c;
      box-shadow: 0 4px 24px rgba(0,212,160,0.3), 0 1px 0 rgba(255,255,255,0.15) inset;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      border-radius: 14px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,212,160,0.45);
    }

    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      font-weight: 400;
      font-size: 0.85rem;
      display: none;
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: rgba(0,212,160,0.3);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
      min-height: 18px;
    }

    .spinner {
      width: 12px; height: 12px;
      border: 1.5px solid rgba(0,212,160,0.2);
      border-top-color: var(--emerald);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .footer-brand strong {
      color: var(--emerald);
    }

    .footer-note {
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.6;
    }

    /* token display */
    .token-display {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: rgba(0,212,160,0.4);
      margin-bottom: 24px;
      word-break: break-all;
      padding: 10px 14px;
      background: rgba(0,212,160,0.04);
      border: 1px solid rgba(0,212,160,0.08);
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="badge">Keamanan Akun</div>

  <div class="icon-wrap">
    <svg viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="68" height="68" rx="18" fill="rgba(0,212,160,0.08)"/>
      <rect x="0.5" y="0.5" width="67" height="67" rx="17.5" stroke="rgba(0,212,160,0.2)"/>
      <!-- Shield -->
      <path d="M34 16L20 22V32C20 40.5 26.4 48.4 34 50.5C41.6 48.4 48 40.5 48 32V22L34 16Z" fill="rgba(0,212,160,0.12)" stroke="#00d4a0" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- Lock body -->
      <rect x="27" y="33" width="14" height="10" rx="3" fill="rgba(0,212,160,0.15)" stroke="#00d4a0" stroke-width="1.5"/>
      <!-- Lock shackle -->
      <path d="M29 33V29.5C29 27 31 25 34 25C37 25 39 27 39 29.5V33" stroke="#00d4a0" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Lock hole -->
      <circle cx="34" cy="38" r="1.5" fill="#00d4a0"/>
    </svg>
  </div>

  <h1>Reset <span>Password</span></h1>
  <p class="subtitle">Link ini akan membuka aplikasi SakuDua dan memandu kamu untuk membuat password baru yang aman.</p>

  <div class="token-display" id="tokenDisplay"></div>

  <div class="divider"></div>

  <button class="btn btn-primary" id="btnOpen" onclick="openApp()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h6v6M10 14L21 3M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
    </svg>
    Buka di Aplikasi SakuDua
  </button>

  <button class="btn btn-secondary" id="btnStore">
    Download SakuDua
  </button>

  <div class="status" id="status"></div>

  <div class="footer">
    <span class="footer-brand"><strong>SAKUDUA</strong> · Secure</span>
    <span class="footer-note">Link berlaku 15 menit</span>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token') || 'demo-token-preview';

  const PLAY_STORE = 'https://play.google.com/store/apps/details?id=com.sakudua.app';
  const APP_STORE  = 'https://apps.apple.com/app/sakudua';

  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua);
  const storeUrl = isIOS ? APP_STORE : PLAY_STORE;

  document.getElementById('btnStore').href = storeUrl;

  if (token && token !== 'demo-token-preview') {
    const td = document.getElementById('tokenDisplay');
    td.style.display = 'block';
    td.textContent = 'token: ' + token.substring(0, 24) + '...';
  }

  function openApp() {
    const deepLink = `sakudua://reset-password?token=${token}`;
    const status = document.getElementById('status');
    status.innerHTML = '<div class="spinner"></div><span>Membuka aplikasi...</span>';

    window.location.href = deepLink;

    setTimeout(() => {
      status.innerHTML = '<span>Aplikasi tidak terdeteksi.</span>';
      document.getElementById('btnStore').style.display = 'flex';
    }, 2500);
  }

  if (token && token !== 'demo-token-preview') {
    setTimeout(openApp, 800);
  }
</script>
</body>
</html>
